version: "3.9"
services:
  blog-database:
    image: mongo
    ports:
      - "27017:27017"
  blog-backend:
    build: backend/
    env_file:
      - backend/.env
    environment:
      - PORT=3001
      - DATABASE_URL=mongodb://host.docker.internal:27017/blog
      - JWT_SECRET=replace-with-random-secret
    ports:
      - "3001:3001"
    depends_on:
      - blog-database
  blog-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:3001/api/v1
    ports:
      - "3000:80"
    depends_on:
      - blog-backend
